# Builds a WordPress-ready zip (wpis-bots/wpis-bots.php inside) and attaches it to the GitHub Release.
name: Release plugin zip

on:
  release:
    types: [published]

jobs:
  zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create archive
        run: |
          mkdir -p build/wpis-bots
          cp wpis-bots.php composer.json composer.lock build/wpis-bots/
          cp -r lib src build/wpis-bots/
          ( cd build && zip -r ../wpis-bots.zip wpis-bots )

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wpis-bots.zip
